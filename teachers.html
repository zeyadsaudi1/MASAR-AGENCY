<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>جميع المعلمين - منصة الأستاذ التعليمية</title>
</head>
<body class="teachers-page">
    <header>
        <div class="header-inner">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-mark">
                        <img class="logo-dark" src="imges/logo.png" alt="MASAR-مَســـار logo dark">
                        <img class="logo-light" src="imges/logo2.png" alt="MASAR-مَســـار logo light">
                    </span>
                    <span>MASAR-مَســـار</span>
                </div>
                <div class="header-icons">
                    <button class="icon-btn theme-switcher" data-theme="light" aria-label="وضع النهار">☀</button>
                    <button class="icon-btn theme-switcher" data-theme="dark" aria-label="وضع الظلام">🌙</button>
                </div>
            </div>
           <nav class="header-actions" id="authActions">
    <!-- سيتم تبديل هذا المحتوى بواسطة JavaScript -->
    <a href="login.html" class="btn-outline">تسجيل الدخول</a>
    <a href="register.html" class="btn-fill">حساب جديد</a>
</nav>

<!-- إضافة قائمة المستخدم (تكون مخفية افتراضياً) -->
<div class="user-dropdown-container" id="userDropdownArea" style="display: none;">
    <button class="user-menu-btn" onclick="toggleUserMenu()">
        <span id="navUserName">الطالب</span>
        <div class="user-icon-circle">👤</div>
    </button>
    
    <div class="user-dropdown-menu" id="userMenu">
        <a href="profile.html" class="menu-item">👤 البروفايل</a>
        <div class="menu-item balance-item">
            <span>💰 الرصيد (النقط):</span>
            <span id="userPoints">0</span> ج.م
        </div>
        <hr>
        <button onclick="handleLogout()" class="menu-item logout-btn">🚪 تسجيل خروج</button>
    </div>
</div>
        </div>
    </header>

    <section class="teachers-section">
        <div class="section-container">
            <h2 class="section-title">جميع المعلمين</h2>
            <p class="section-subtitle"> كل المعلمين المتاحين في المنصة</p>
            <div class="teachers-grid" id="teachersGrid"></div>
        </div>
    </section>

    <script src="script.js" defer></script>
</body>
</html>
