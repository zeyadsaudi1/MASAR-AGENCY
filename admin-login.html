<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>بوابة المشرفين | مَسار</title>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-mark">
                        <img class="logo-dark" src="imges/logo.png" alt="MASAR Logo">
                        <img class="logo-light" src="imges/logo2.png" alt="MASAR Logo">
                    </span>
                    <span>MASAR-مَســـار</span>
                </div>
                <div class="header-icons">
                    <button class="icon-btn theme-switcher" data-theme="light" aria-label="وضع النهار">☀</button>
                    <button class="icon-btn theme-switcher" data-theme="dark" aria-label="وضع الظلام">🌙</button>
                </div>
            </div>
            <nav class="header-actions">
                <a href="index.html" class="btn-outline">الرئيسية</a>
            </nav>
        </div>
    </header>

    <div class="auth-page">
        <div class="auth-left">
            <img src="imges/st2.jpg" alt="شعار الإدارة" class="hero-image">
            <div class="auth-left-content">
                <h1>لوحة التحكم الإدارية</h1>
                <p>بوابة المشرفين وإدارة المحتوى والتحكم الشامل في منصة مَسار التعليمية.</p>
            </div>
        </div>
        <div class="auth-right">
            <div class="form-panel" style="padding-top: 0;">
                <div class="auth-logo">
                    <img src="imges/logo2.png" alt="MASAR logo">
                    <span>MASAR - الإدارة</span>
                </div>
                <p class="form-subtitle">تسجيل دخول المشرفين</p>
                <p class="form-note">يرجى إدخال هاتف الإدارة وكلمة المرور للدخول إلى اللوحة.</p>
                
                <form onsubmit="return handleAdminLogin(event)">
                    <div class="form-group">
                        <label>هاتف الإدارة</label>
                        <input type="tel" name="phone" id="adminPhone" placeholder="مثال: 01234567890" required>
                    </div>
                    <div class="form-group">
                        <label>كلمة المرور</label>
                        <div class="password-field">
                            <input type="password" name="password" id="adminPassword" required>
                            <button type="button" class="password-toggle" onclick="togglePasswordVisibility(this)">👁️</button>
                        </div>
                    </div>
                    <button type="submit" class="btn-fill" style="width:100%; background: #dda852; color: #13201c; font-weight: 700;">دخول لوحة التحكم 🔑</button>
                </form>
            </div>
        </div>
    </div>
    
    <script src="script.js" defer></script>
    <script>
        async function handleAdminLogin(event) {
            event.preventDefault();
            const phone = document.getElementById('adminPhone').value.trim();
            const password = document.getElementById('adminPassword').value.trim();
            const API_URL = window.location.origin;

            try {
                const res = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });
                const data = await res.json();
                
                // التأكد من نجاح الدخول وأن رول المستخدم هو أدمن في الداتابيز
                if (data.success && data.user.role === 'admin') {
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    window.location.href = 'admin.html';
                } else {
                    alert('❌ خطأ: الحساب ليس مشرفاً أو البيانات غير صحيحة');
                }
            } catch (err) {
                // تراجع تلقائي لوضع الأوفلاين/الاختبار لدخول الأدمن الافتراضي
                if (phone === '01234567890' && password === 'admin') {
                    localStorage.setItem('currentUser', JSON.stringify({ role: 'admin', name: 'Admin' }));
                    window.location.href = 'admin.html';
                } else {
                    alert('❌ خطأ في الاتصال بقاعدة البيانات');
                }
            }
            return false;
        }
    </script>
</body>
</html>
