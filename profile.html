<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>الملف الشخصي - MASAR</title>
    <style>
        .profile-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--bg) 0%, var(--surface-alt) 100%);
            direction: rtl;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .dark-mode .profile-card {
            background: rgba(26, 37, 39, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }

        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 35px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.05);
            padding-bottom: 25px;
        }

        .dark-mode .profile-header {
            border-bottom-color: rgba(255, 255, 255, 0.05);
        }

        .profile-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-green) 0%, #2ca772 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 10px 25px rgba(44, 167, 114, 0.3);
        }

        .profile-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-dark);
            margin: 0;
        }

        .profile-role-badge {
            background: rgba(221, 168, 82, 0.15);
            color: #dda852;
            padding: 6px 16px;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .profile-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .profile-details {
                grid-template-columns: 1fr;
            }
        }

        .detail-item {
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.03);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .dark-mode .detail-item {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.04);
        }

        .detail-label {
            font-size: 0.85rem;
            color: var(--gray);
            font-weight: 600;
        }

        .detail-value {
            font-size: 1.1rem;
            color: var(--text-dark);
            font-weight: 700;
        }

        .profile-actions {
            margin-top: 35px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .profile-btn {
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-mark">
                        <img class="logo-dark" src="imges/logo.png" alt="MASAR Logo dark">
                        <img class="logo-light" src="imges/logo2.png" alt="MASAR Logo light">
                    </span>
                    <span>MASAR-مَســـار</span>
                </div>
                <div class="header-icons">
                    <button class="icon-btn theme-switcher" data-theme="light" aria-label="وضع النهار">☀</button>
                    <button class="icon-btn theme-switcher" data-theme="dark" aria-label="وضع الظلام">🌙</button>
                </div>
            </div>
            <nav class="header-actions">
                <a href="index.html" class="btn-outline">الرئيسية</a>
                <button onclick="handleLogout()" class="btn-fill">تسجيل خروج</button>
            </nav>
        </div>
    </header>

    <div class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar-large" id="avatarLetter">👤</div>
                <h2 class="profile-title" id="profileName">طالب مسار</h2>
                <span class="profile-role-badge">حساب طالب نشط</span>
            </div>

            <div class="profile-details">
                <div class="detail-item">
                    <span class="detail-label">رقم الهاتف</span>
                    <span class="detail-value" id="profilePhone">-</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">رقم ولي الأمر</span>
                    <span class="detail-value" id="profileParentPhone">-</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">الرقم القومي</span>
                    <span class="detail-value" id="profileNationalId">-</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">تاريخ الميلاد</span>
                    <span class="detail-value" id="profileBirthDate">-</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">المرحلة الدراسية</span>
                    <span class="detail-value" id="profileGrade">-</span>
                </div>
                <div class="detail-item" id="sectionDetailItem" style="display: none;">
                    <span class="detail-label">الشعبة</span>
                    <span class="detail-value" id="profileSection">-</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">اللغة الثانية</span>
                    <span class="detail-value" id="profileLang">-</span>
                </div>
                <div class="detail-item" style="border: 2px solid rgba(44, 167, 114, 0.3); background: rgba(44, 167, 114, 0.05);">
                    <span class="detail-label" style="color: var(--primary-green)">الرصيد الحالي</span>
                    <span class="detail-value" style="color: var(--primary-green); font-size: 1.3rem;" id="profileBalance">0 ج.م</span>
                </div>
            </div>

            <div class="profile-actions">
                <a href="index.html" class="profile-btn btn-fill" style="width: 100%;">العودة للرئيسية</a>
            </div>
        </div>
    </div>

    <script src="script.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                alert('عذراً، يجب تسجيل الدخول لرؤية ملفك الشخصي.');
                window.location.href = 'login.html';
                return;
            }

            const fullName = `${currentUser.firstName || ''} ${currentUser.secondName || ''} ${currentUser.thirdName || ''} ${currentUser.fourthName || ''}`.trim() || currentUser.name || 'طالب مسار';
            document.getElementById('profileName').textContent = fullName;
            document.getElementById('avatarLetter').textContent = (currentUser.firstName || 'ط')[0];
            document.getElementById('profilePhone').textContent = currentUser.phone || '-';
            document.getElementById('profileParentPhone').textContent = currentUser.parentPhone || '-';
            document.getElementById('profileNationalId').textContent = currentUser.nationalId || '-';
            document.getElementById('profileGrade').textContent = currentUser.grade || '-';
            document.getElementById('profileLang').textContent = currentUser.secondLanguage || 'لا يوجد';
            document.getElementById('profileBalance').textContent = `${currentUser.balance !== undefined ? currentUser.balance : 0} ج.م`;

            if (currentUser.section) {
                document.getElementById('sectionDetailItem').style.display = 'flex';
                document.getElementById('profileSection').textContent = currentUser.section;
            }

            // تنسيق تاريخ الميلاد بشكل مقروء
            if (currentUser.birthDate) {
                const date = new Date(currentUser.birthDate);
                if (!isNaN(date)) {
                    document.getElementById('profileBirthDate').textContent = date.toLocaleDateString('ar-EG', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                } else {
                    document.getElementById('profileBirthDate').textContent = currentUser.birthDate;
                }
            }
        });
    </script>
</body>
</html>
