<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>لوحة التحكم</title>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-mark">
                        <img class="logo-dark" src="imges/logo.png" alt="MASAR-مَســـار logo dark">
                        <img class="logo-light" src="imges/logo2.png" alt="MASAR-مَســـار logo light">
                    </span>
                    <span>لوحة تحكم الأستاذ</span>
                </div>
                <div class="header-icons">
                    <button class="icon-btn theme-switcher" data-theme="light" aria-label="وضع النهار">☀</button>
                    <button class="icon-btn theme-switcher" data-theme="dark" aria-label="وضع الظلام">🌙</button>
                </div>
            </div>
            <nav class="header-actions">
                <a href="index.html" class="btn-outline">خروج</a>
            </nav>
        </div>
    </header>

    <div class="admin-container">
        <aside class="sidebar">
            <h3>القوائم</h3>
            <ul>
                <li><button onclick="showSection('users')" class="active">المستخدمون</button></li>
                <li><button onclick="showSection('codes')">الأكواد</button></li>
                <li><button onclick="showSection('online')">المتصلين حالياً</button></li>
                <li><button onclick="showSection('add-video')">إضافة فيديو</button></li>
                <li><button onclick="showSection('generate-codes')">توليد أكواد</button></li>
            </ul>
        </aside>
        <main class="main-content">
            <div id="users-list"></div>
            <div id="codes-list" style="display: none;"></div>
            <div id="online-list" style="display: none;"><h3 id="online">المتصلين حالياً</h3><p>لا يوجد متصلين (محاكاة)</p></div>
            <div id="add-video" style="display: none;">
                <h3>إضافة فيديو جديد</h3>
                <form onsubmit="handleAddVideo(event)" class="form-container">
                    <div class="form-group"><label>عنوان الفيديو</label><input type="text" required></div>
                    <div class="form-group"><label>رابط الفيديو</label><input type="text"></div>
                    <div class="form-group"><label>السعر</label><input type="number" required></div>
                    <div class="form-group"><label>صورة الفيديو</label><input type="file" accept="image/*" required></div>
                    <div class="form-group"><label>ملف الفيديو</label><input type="file" accept="video/*"></div>
                    <button type="submit" class="btn-red">رفع الفيديو</button>
                </form>
            </div>
            <div id="generate-codes" style="display: none;">
                <h3>توليد أكواد شحن</h3>
                <form onsubmit="handleGenerateCodes(event)" class="form-container">
                    <div class="form-group"><label>اختر الفيديو</label><select required onchange="setPrice(this.value)"></select></div>
                    <div class="form-group"><label>عدد الأكواد</label><input type="number" required></div>
                    <div class="form-group"><label>قيمة الكود (جنية)</label><input type="number" required id="code-price"></div>
                    <button type="submit" class="btn-red">توليد وتصدير Excel</button>
                </form>
            </div>
        </main>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
